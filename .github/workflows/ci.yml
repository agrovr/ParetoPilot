name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}/src

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Validate synthetic fixtures
        run: |
          python -m paretopilot validate examples/synthetic-results.json
          python -m paretopilot validate-llama-bench tests/fixtures/llama_bench.synthetic.jsonl
