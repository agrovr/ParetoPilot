name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Smoke installed console and fixtures
        run: |
          paretopilot --version
          paretopilot validate examples/synthetic-results.json
          paretopilot recommend examples/synthetic-results.json --constraints configs/constraints.example.json
          paretopilot validate-llama-bench tests/fixtures/llama_bench.synthetic.jsonl

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build frontend
        run: python -m pip install "build>=1.2.2,<2"
      - name: Build wheel
        run: python -m build --wheel
      - name: Install wheel into an isolated environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/paretopilot-wheel-smoke"
          "$RUNNER_TEMP/paretopilot-wheel-smoke/bin/python" -m pip install --no-deps dist/*.whl
          "$RUNNER_TEMP/paretopilot-wheel-smoke/bin/paretopilot" --version
          "$RUNNER_TEMP/paretopilot-wheel-smoke/bin/paretopilot" validate \
            examples/synthetic-results.json
          "$RUNNER_TEMP/paretopilot-wheel-smoke/bin/paretopilot" recommend \
            examples/synthetic-results.json \
            --constraints configs/constraints.example.json
