name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}/src

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Validate synthetic fixtures
        run: |
          python -m paretopilot validate examples/synthetic-results.json
          python -m paretopilot validate-llama-bench tests/fixtures/llama_bench.synthetic.jsonl
