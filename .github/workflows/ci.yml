name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Validate synthetic fixtures
        run: |
          paretopilot validate examples/synthetic-results.json
          paretopilot validate-llama-bench tests/fixtures/llama_bench.synthetic.jsonl
