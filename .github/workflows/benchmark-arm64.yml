name: Native Arm64 benchmark

on:
  workflow_dispatch:
    inputs:
      prompt_tokens:
        description: Prompt tokens per test
        required: true
        default: "512"
        type: string
      generation_tokens:
        description: Generated tokens per test
        required: true
        default: "128"
        type: string
      repetitions:
        description: Recorded repetitions per test
        required: true
        default: "10"
        type: string
  push:
    branches:
      - agent/arm64-benchmark-workflow
    paths:
      - ".github/workflows/benchmark-arm64.yml"
      - "pyproject.toml"
      - "src/**"

permissions:
  contents: read

concurrency:
  group: arm64-benchmark-${{ github.ref }}
  cancel-in-progress: false

env:
  LLAMA_CPP_COMMIT: 67b9b0e7f6ce45d929a4411907d3c48ec719e81c
  KLEIDIAI_VERSION: v1.24.0
  KLEIDIAI_SHA256: 9348b969e042d8890a54b01a463dbe71f5a4c074b5329e9c26a85ef3b68aa19b
  KLEIDIAI_SIZE_BYTES: "2466038"
  MODEL_REPOSITORY: Qwen/Qwen2.5-1.5B-Instruct-GGUF
  MODEL_REVISION: 91cad51170dc346986eccefdc2dd33a9da36ead9
  MODEL_FILENAME: qwen2.5-1.5b-instruct-q4_0.gguf
  MODEL_SHA256: dcd819ff094852c38faba6873d8ff0c9d51eadb2844539e52042ae5d647bbfdb
  MODEL_SIZE_BYTES: "1066227232"
  THREADS: "4"
  BATCH_SIZE: "512"
  UBATCH_SIZE: "128"
  PYTHONPATH: ${{ github.workspace }}/src

jobs:
  benchmark:
    name: Paired generic vs KleidiAI
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    env:
      PROMPT_TOKENS: ${{ inputs.prompt_tokens || '512' }}
      GENERATION_TOKENS: ${{ inputs.generation_tokens || '128' }}
      REPETITIONS: ${{ inputs.repetitions || '10' }}
      CANONICAL_RUN: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == github.event.repository.default_branch && inputs.prompt_tokens == '512' && inputs.generation_tokens == '128' && inputs.repetitions == '10' }}

    steps:
      - name: Check out ParetoPilot
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Initialize evidence status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          canonical = os.environ["CANONICAL_RUN"].lower() == "true"
          payload = {
              "schema_version": "1.0",
              "status": "incomplete",
              "valid_evidence": False,
              "measurement_valid": False,
              "requested_classification": "canonical" if canonical else "exploratory",
              "reason": "benchmark and validation steps have not completed",
          }
          Path("artifacts/status.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Validate bounded inputs
        shell: bash
        run: |
          set -euo pipefail
          require_integer() {
            local name="$1"
            local value="$2"
            local minimum="$3"
            local maximum="$4"
            if [[ ! "$value" =~ ^[0-9]+$ ]]; then
              echo "::error::${name} must be an integer from ${minimum} to ${maximum}"
              exit 2
            fi
            local decimal_value=$((10#$value))
            if (( decimal_value < minimum || decimal_value > maximum )); then
              echo "::error::${name} must be an integer from ${minimum} to ${maximum}"
              exit 2
            fi
          }
          require_integer "prompt_tokens" "$PROMPT_TOKENS" 32 4096
          require_integer "generation_tokens" "$GENERATION_TOKENS" 16 512
          require_integer "repetitions" "$REPETITIONS" 10 30

      - name: Verify preinstalled build and validation tools
        shell: bash
        run: |
          set -euo pipefail
          for required_tool in cmake curl g++-13 gcc-13 git ninja nm python sha256sum tar; do
            command -v "$required_tool"
          done

      - name: Capture runner environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            artifacts/build \
            artifacts/commands \
            artifacts/environment \
            artifacts/raw \
            artifacts/settings \
            artifacts/summary \
            artifacts/validation
          uname -a | tee artifacts/environment/uname.txt
          lscpu | tee artifacts/environment/lscpu.txt
          cat /proc/cpuinfo > artifacts/environment/cpuinfo.txt
          cat /etc/os-release > artifacts/environment/os-release.txt
          free -h > artifacts/environment/memory.txt
          df -h > artifacts/environment/disk.txt
          nproc > artifacts/environment/nproc.txt
          gcc-13 --version > artifacts/environment/gcc.txt
          g++-13 --version > artifacts/environment/g++.txt
          cmake --version > artifacts/environment/cmake.txt
          ninja --version > artifacts/environment/ninja.txt
          cat /proc/sys/kernel/perf_event_paranoid > artifacts/environment/perf-event-paranoid.txt
          if command -v perf >/dev/null 2>&1; then
            set +e
            perf stat -e cycles -- true > artifacts/environment/perf-cycles-probe.txt 2>&1
            perf_status="$?"
            set -e
          else
            printf '%s\n' "perf is not installed on this runner image" > artifacts/environment/perf-cycles-probe.txt
            perf_status="127"
          fi
          printf '%s\n' "$perf_status" > artifacts/environment/perf-cycles-probe.exit-code.txt
          python - <<'PY'
          import json
          import os
          import platform
          from pathlib import Path

          keys = [
              "GITHUB_ACTION",
              "GITHUB_JOB",
              "GITHUB_REF",
              "GITHUB_REPOSITORY",
              "GITHUB_RUN_ATTEMPT",
              "GITHUB_RUN_ID",
              "GITHUB_SHA",
              "GITHUB_WORKFLOW_REF",
              "GITHUB_WORKFLOW_SHA",
              "ImageOS",
              "ImageVersion",
              "RUNNER_ARCH",
              "RUNNER_NAME",
              "RUNNER_OS",
          ]
          payload = {
              "captured_environment": {key: os.environ.get(key) for key in keys},
              "machine": platform.machine(),
              "platform": platform.platform(),
              "python_version": platform.python_version(),
          }
          Path("artifacts/environment/runner.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          python -m paretopilot doctor \
            --require-evidence-host \
            --output artifacts/environment/paretopilot-doctor.json

      - name: Fetch pinned llama.cpp and KleidiAI sources
        shell: bash
        run: |
          set -euo pipefail
          llama_source="$RUNNER_TEMP/llama.cpp"
          git init "$llama_source"
          git -C "$llama_source" remote add origin https://github.com/ggml-org/llama.cpp.git
          git -C "$llama_source" fetch --depth 1 origin "$LLAMA_CPP_COMMIT"
          git -C "$llama_source" checkout --detach FETCH_HEAD
          actual_commit="$(git -C "$llama_source" rev-parse HEAD)"
          test "$actual_commit" = "$LLAMA_CPP_COMMIT"
          printf '%s\n' "$actual_commit" > artifacts/build/llama-cpp-commit.txt

          kleidiai_archive="$RUNNER_TEMP/kleidiai-${KLEIDIAI_VERSION}-src.tar.gz"
          kleidiai_url="https://github.com/ARM-software/kleidiai/releases/download/${KLEIDIAI_VERSION}/kleidiai-${KLEIDIAI_VERSION}-src.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --connect-timeout 30 \
            --max-time 300 \
            --retry 5 \
            --retry-all-errors \
            --output "$kleidiai_archive" \
            "$kleidiai_url"
          actual_size="$(stat --format='%s' "$kleidiai_archive")"
          test "$actual_size" = "$KLEIDIAI_SIZE_BYTES"
          printf '%s  %s\n' "$KLEIDIAI_SHA256" "$kleidiai_archive" | sha256sum --check
          sha256sum "$kleidiai_archive" > artifacts/build/kleidiai-source.sha256

          kleidiai_source="$RUNNER_TEMP/kleidiai-${KLEIDIAI_VERSION}"
          mkdir "$kleidiai_source"
          tar -xzf "$kleidiai_archive" --strip-components=1 -C "$kleidiai_source"
          test -f "$kleidiai_source/CMakeLists.txt"

      - name: Build controlled generic and KleidiAI binaries
        shell: bash
        run: |
          set -euo pipefail
          llama_source="$RUNNER_TEMP/llama.cpp"
          kleidiai_source="$RUNNER_TEMP/kleidiai-${KLEIDIAI_VERSION}"
          build_variant() {
            local label="$1"
            local kleidiai="$2"
            local build_dir="$RUNNER_TEMP/build-${label}"
            cmake_args=(
              -S "$llama_source"
              -B "$build_dir"
              -G Ninja
              -DCMAKE_BUILD_TYPE=Release
              -DCMAKE_C_COMPILER=gcc-13
              -DCMAKE_CXX_COMPILER=g++-13
              -DBUILD_SHARED_LIBS=OFF
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              "-DFETCHCONTENT_SOURCE_DIR_KLEIDIAI_DOWNLOAD=${kleidiai_source}"
              -DGGML_NATIVE=ON
              -DGGML_CPU_REPACK=ON
              "-DGGML_CPU_KLEIDIAI=${kleidiai}"
              -DGGML_BLAS=OFF
              -DGGML_CUDA=OFF
              -DGGML_OPENCL=OFF
              -DGGML_RPC=OFF
              -DGGML_VULKAN=OFF
              -DLLAMA_BUILD_TESTS=OFF
              -DLLAMA_BUILD_EXAMPLES=OFF
              -DLLAMA_BUILD_SERVER=OFF
              -DLLAMA_BUILD_APP=OFF
              -DLLAMA_BUILD_TOOLS=ON
            )
            cmake "${cmake_args[@]}" 2>&1 | tee "artifacts/build/${label}-configure.log"
            cmake --build "$build_dir" --target llama-bench --parallel "$THREADS" 2>&1 | tee "artifacts/build/${label}-compile.log"
            grep -Fxq "GGML_CPU_KLEIDIAI:BOOL=${kleidiai}" "$build_dir/CMakeCache.txt"
            grep -Fxq "BUILD_SHARED_LIBS:BOOL=OFF" "$build_dir/CMakeCache.txt"
            cp "$build_dir/CMakeCache.txt" "artifacts/build/${label}-CMakeCache.txt"
            sha256sum "$build_dir/bin/llama-bench" > "artifacts/build/${label}-llama-bench.sha256"
            ldd "$build_dir/bin/llama-bench" > "artifacts/build/${label}-llama-bench.ldd.txt"
          }
          build_variant generic OFF
          build_variant kleidiai ON
          nm -C "$RUNNER_TEMP/build-kleidiai/bin/llama-bench" | grep -Ei "kleidiai|(^|[^a-z])kai_" | head -n 500 > artifacts/build/kleidiai-symbols.txt || true

      - name: Download and verify pinned Qwen Q4_0 model
        shell: bash
        run: |
          set -euo pipefail
          model_path="$RUNNER_TEMP/$MODEL_FILENAME"
          model_url="https://huggingface.co/$MODEL_REPOSITORY/resolve/$MODEL_REVISION/$MODEL_FILENAME?download=true"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --connect-timeout 30 \
            --max-time 1800 \
            --retry 5 \
            --retry-all-errors \
            --output "$model_path" \
            "$model_url"
          actual_size="$(stat --format='%s' "$model_path")"
          test "$actual_size" = "$MODEL_SIZE_BYTES"
          printf '%s  %s\n' "$MODEL_SHA256" "$model_path" | sha256sum --check
          sha256sum "$model_path" > artifacts/build/model.sha256

      - name: Record immutable benchmark manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schema_version": "1.0",
              "synthetic": False,
              "classification": (
                  "canonical"
                  if os.environ["CANONICAL_RUN"].lower() == "true"
                  else "exploratory"
              ),
              "evidence_scope": "paired GitHub-hosted Arm64 runner experiment",
              "repository": {
                  "name": os.environ["GITHUB_REPOSITORY"],
                  "commit": os.environ["GITHUB_SHA"],
                  "workflow_ref": os.environ.get("GITHUB_WORKFLOW_REF"),
                  "workflow_commit": os.environ.get("GITHUB_WORKFLOW_SHA"),
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              },
              "execution_order": [
                  "generic-pass-1",
                  "kleidiai-pass-1",
                  "kleidiai-pass-2",
                  "generic-pass-2",
              ],
              "llama_cpp": {
                  "commit": os.environ["LLAMA_CPP_COMMIT"],
                  "generic_kleidiai": False,
                  "optimized_kleidiai": True,
              },
              "kleidiai": {
                  "version": os.environ["KLEIDIAI_VERSION"],
                  "source_sha256": os.environ["KLEIDIAI_SHA256"],
                  "source_size_bytes": int(os.environ["KLEIDIAI_SIZE_BYTES"]),
              },
              "model": {
                  "repository": os.environ["MODEL_REPOSITORY"],
                  "revision": os.environ["MODEL_REVISION"],
                  "filename": os.environ["MODEL_FILENAME"],
                  "sha256": os.environ["MODEL_SHA256"],
                  "size_bytes": int(os.environ["MODEL_SIZE_BYTES"]),
                  "quantization": "Q4_0",
              },
              "benchmark": {
                  "prompt_tokens": int(os.environ["PROMPT_TOKENS"]),
                  "generation_tokens": int(os.environ["GENERATION_TOKENS"]),
                  "threads": int(os.environ["THREADS"]),
                  "batch_size": int(os.environ["BATCH_SIZE"]),
                  "ubatch_size": int(os.environ["UBATCH_SIZE"]),
                  "repetitions_per_pass": int(os.environ["REPETITIONS"]),
                  "warmup": True,
                  "cpu_only": True,
              },
              "quality": {
                  "evaluated": False,
                  "reason": "both variants use the identical model file; this run isolates runtime-kernel throughput",
              },
          }
          Path("artifacts/manifest.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          common_settings = {
              "prompt_tokens": payload["benchmark"]["prompt_tokens"],
              "generation_tokens": payload["benchmark"]["generation_tokens"],
              "threads": payload["benchmark"]["threads"],
              "batch_size": payload["benchmark"]["batch_size"],
              "ubatch_size": payload["benchmark"]["ubatch_size"],
              "repetitions_per_pass": payload["benchmark"]["repetitions_per_pass"],
              "warmup": True,
              "cpu_only": True,
              "model_sha256": payload["model"]["sha256"],
              "llama_cpp_commit": payload["llama_cpp"]["commit"],
          }
          for label, enabled in (("generic", False), ("kleidiai", True)):
              settings = {**common_settings, "build": {"kleidiai": enabled}}
              Path(f"artifacts/settings/{label}.json").write_text(
                  json.dumps(settings, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Run balanced paired benchmarks
        shell: bash
        run: |
          set -euo pipefail
          model_path="$RUNNER_TEMP/$MODEL_FILENAME"
          run_variant() {
            local label="$1"
            local build_name="$2"
            local binary="$RUNNER_TEMP/build-${build_name}/bin/llama-bench"
            benchmark_args=(
              "$binary"
              -m "$model_path"
              -p "$PROMPT_TOKENS"
              -n "$GENERATION_TOKENS"
              -t "$THREADS"
              -b "$BATCH_SIZE"
              -ub "$UBATCH_SIZE"
              -r "$REPETITIONS"
              -dev none
              -ngl 0
              -nopo 1
              -o jsonl
            )
            python - "$label" "${benchmark_args[@]}" <<'PY'
          import json
          from pathlib import Path
          import sys

          label = sys.argv[1]
          payload = {
              "schema_version": "1.0",
              "label": label,
              "argv": sys.argv[2:],
          }
          Path(f"artifacts/commands/{label}.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
            "${benchmark_args[@]}" > "artifacts/raw/${label}.jsonl" 2> "artifacts/raw/${label}.stderr.log"
            python -m paretopilot validate-llama-bench \
              "artifacts/raw/${label}.jsonl" \
              --evidence \
              --expected-commit "$LLAMA_CPP_COMMIT" \
              --output "artifacts/validation/${label}.json"
          }
          run_variant generic-pass-1 generic
          sleep 15
          run_variant kleidiai-pass-1 kleidiai
          sleep 15
          run_variant kleidiai-pass-2 kleidiai
          sleep 15
          run_variant generic-pass-2 generic
          if grep -Fq "CPU_KLEIDIAI model buffer" artifacts/raw/generic-pass-1.stderr.log; then
            echo "::error::generic pass 1 unexpectedly dispatched KleidiAI"
            exit 5
          fi
          if grep -Fq "CPU_KLEIDIAI model buffer" artifacts/raw/generic-pass-2.stderr.log; then
            echo "::error::generic pass 2 unexpectedly dispatched KleidiAI"
            exit 5
          fi
          grep -Fq "CPU_KLEIDIAI model buffer" artifacts/raw/kleidiai-pass-1.stderr.log
          grep -Fq "CPU_KLEIDIAI model buffer" artifacts/raw/kleidiai-pass-2.stderr.log

      - name: Summarize and compare compatible artifacts
        shell: bash
        run: |
          set -euo pipefail
          python -m paretopilot summarize-llama-bench \
            --label generic \
            --artifact pass-1=artifacts/raw/generic-pass-1.jsonl \
            --artifact pass-2=artifacts/raw/generic-pass-2.jsonl \
            --settings artifacts/settings/generic.json \
            --output artifacts/summary/generic.json
          python -m paretopilot summarize-llama-bench \
            --label kleidiai \
            --artifact pass-1=artifacts/raw/kleidiai-pass-1.jsonl \
            --artifact pass-2=artifacts/raw/kleidiai-pass-2.jsonl \
            --settings artifacts/settings/kleidiai.json \
            --output artifacts/summary/kleidiai.json
          python -m paretopilot compare-llama-bench \
            --generic artifacts/summary/generic.json \
            --kleidiai artifacts/summary/kleidiai.json \
            --output artifacts/summary/comparison-pooled.json

          python -m paretopilot summarize-llama-bench \
            --label generic-pass-1 \
            --artifact pass-1=artifacts/raw/generic-pass-1.jsonl \
            --settings artifacts/settings/generic.json \
            --output artifacts/summary/generic-pass-1.json
          python -m paretopilot summarize-llama-bench \
            --label kleidiai-pass-1 \
            --artifact pass-1=artifacts/raw/kleidiai-pass-1.jsonl \
            --settings artifacts/settings/kleidiai.json \
            --output artifacts/summary/kleidiai-pass-1.json
          python -m paretopilot compare-llama-bench \
            --generic artifacts/summary/generic-pass-1.json \
            --kleidiai artifacts/summary/kleidiai-pass-1.json \
            --output artifacts/summary/comparison-pair-1.json

          python -m paretopilot summarize-llama-bench \
            --label generic-pass-2 \
            --artifact pass-2=artifacts/raw/generic-pass-2.jsonl \
            --settings artifacts/settings/generic.json \
            --output artifacts/summary/generic-pass-2.json
          python -m paretopilot summarize-llama-bench \
            --label kleidiai-pass-2 \
            --artifact pass-2=artifacts/raw/kleidiai-pass-2.jsonl \
            --settings artifacts/settings/kleidiai.json \
            --output artifacts/summary/kleidiai-pass-2.json
          python -m paretopilot compare-llama-bench \
            --generic artifacts/summary/generic-pass-2.json \
            --kleidiai artifacts/summary/kleidiai-pass-2.json \
            --output artifacts/summary/comparison-pair-2.json

      - name: Finalize evidence bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          canonical = os.environ["CANONICAL_RUN"].lower() == "true"
          payload = {
              "schema_version": "1.0",
              "status": "complete",
              "valid_evidence": canonical,
              "measurement_valid": True,
              "classification": "canonical" if canonical else "exploratory",
              "reason": (
                  "all benchmark, dispatch, compatibility, and summary gates passed"
                  if canonical
                  else "measurement gates passed, but branch or inputs are exploratory"
              ),
          }
          Path("artifacts/status.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          checksum_file="$RUNNER_TEMP/paretopilot-SHA256SUMS"
          (
            cd artifacts
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              > "$checksum_file"
          )
          mv "$checksum_file" artifacts/SHA256SUMS

      - name: Upload validated benchmark evidence
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.CANONICAL_RUN == 'true' && 'arm64-benchmark' || 'EXPLORATORY-arm64-benchmark' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Mark failed bundle as incomplete
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "schema_version": "1.0",
              "status": "incomplete",
              "valid_evidence": False,
              "measurement_valid": False,
              "classification": "incomplete",
              "reason": "one or more workflow steps failed; this bundle is diagnostic only",
          }
          Path("artifacts/status.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          checksum_file="$RUNNER_TEMP/paretopilot-SHA256SUMS"
          (
            cd artifacts
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              > "$checksum_file"
          )
          mv "$checksum_file" artifacts/SHA256SUMS

      - name: Upload incomplete diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: INCOMPLETE-arm64-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
          compression-level: 9
