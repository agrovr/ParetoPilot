name: Deploy decision report to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "docs/assets/**"
      - "results/published/**"
      - "src/paretopilot/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish static evidence report
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Assemble static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/assets
          PYTHONPATH=src python -m paretopilot assemble-study \
            results/published/29940067201 \
            --benchmarks-output _site/benchmark-set.json \
            --constraints-output _site/constraints.json \
            --assembly-output _site/assembly.json
          PYTHONPATH=src python -m paretopilot report \
            _site/benchmark-set.json \
            --constraints _site/constraints.json \
            --output _site/index.html \
            --recommendation-output _site/recommendation.json
          cp _site/index.html _site/report.html
          cp docs/assets/architecture.svg _site/assets/architecture.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
