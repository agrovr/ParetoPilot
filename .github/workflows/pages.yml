name: Deploy decision report to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "demo/canonical-study/**"
      - "docs/assets/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish static evidence report
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Assemble static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/assets
          cp demo/canonical-study/report.html _site/index.html
          cp demo/canonical-study/report.html _site/report.html
          cp demo/canonical-study/benchmark-set.json _site/benchmark-set.json
          cp demo/canonical-study/constraints.json _site/constraints.json
          cp demo/canonical-study/recommendation.json _site/recommendation.json
          cp docs/assets/architecture.svg _site/assets/architecture.svg
          cp docs/assets/architecture.png _site/assets/architecture.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
